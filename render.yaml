services:
  - type: web
    name: legalx-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legalx-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: /app/chroma_db
      - key: AUDIO_CACHE_PATH
        value: /app/audio_cache

databases:
  - name: legalx-db
    plan: free
    databaseName: legalx_db
    user: legalx
